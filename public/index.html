<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>किसान मित्र AI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Devanagari:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --green-dark: #1b4332;
      --green-mid: #2d6a4f;
      --green-light: #40916c;
      --green-accent: #52b788;
      --green-bright: #74c69d;
      --green-pale: #d8f3dc;
      --bg: #0d1f16;
      --surface: #162820;
      --surface2: #1e3a2a;
      --border: rgba(82,183,136,0.15);
      --text: #e8f5e9;
      --text-muted: #81c784;
      --user-bubble: #1b5e20;
      --bot-bubble: #1a2e23;
      --radius: 18px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    html, body {
      height: 100%;
      height: 100dvh;
      overflow: hidden;
      font-family: 'Inter', 'Noto Sans Devanagari', sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    /* ── APP SHELL ── */
    .app {
      display: flex;
      flex-direction: column;
      height: 100%;
      height: 100dvh;
      max-width: 480px;
      margin: 0 auto;
      position: relative;
    }

    /* ── HEADER ── */
    header {
      flex-shrink: 0;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      z-index: 10;
    }

    .avatar-header {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--green-light), var(--green-accent));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      flex-shrink: 0;
      box-shadow: 0 2px 8px rgba(82,183,136,0.3);
    }

    .header-info { flex: 1; min-width: 0; }
    .header-info h1 {
      font-size: 17px;
      font-weight: 700;
      color: var(--text);
      letter-spacing: 0.2px;
    }
    .header-info .status {
      font-size: 12px;
      color: var(--green-accent);
      display: flex;
      align-items: center;
      gap: 5px;
      margin-top: 1px;
    }
    .status-dot {
      width: 7px;
      height: 7px;
      background: #4caf50;
      border-radius: 50%;
      animation: statusPulse 2s infinite;
    }
    @keyframes statusPulse { 0%,100%{opacity:1} 50%{opacity:0.5} }

    .header-badge {
      background: rgba(82,183,136,0.15);
      border: 1px solid rgba(82,183,136,0.3);
      color: var(--green-bright);
      font-size: 11px;
      font-weight: 600;
      padding: 4px 10px;
      border-radius: 20px;
      white-space: nowrap;
    }

    /* ── QUICK CHIPS ── */
    .chips-wrap {
      flex-shrink: 0;
      padding: 10px 12px 6px;
      overflow-x: auto;
      display: flex;
      gap: 8px;
      scrollbar-width: none;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
    }
    .chips-wrap::-webkit-scrollbar { display: none; }

    .chip {
      flex-shrink: 0;
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--green-bright);
      font-size: 12.5px;
      font-weight: 500;
      padding: 7px 13px;
      border-radius: 20px;
      cursor: pointer;
      transition: all 0.18s;
      white-space: nowrap;
      font-family: inherit;
    }
    .chip:active { background: var(--green-light); color: #fff; transform: scale(0.96); }

    /* ── CHAT AREA ── */
    .chat-area {
      flex: 1;
      overflow-y: auto;
      padding: 16px 12px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      scroll-behavior: smooth;
      overscroll-behavior: contain;
    }
    .chat-area::-webkit-scrollbar { width: 3px; }
    .chat-area::-webkit-scrollbar-thumb { background: rgba(82,183,136,0.2); border-radius: 4px; }

    /* Welcome */
    .welcome {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 30px 20px;
      text-align: center;
      flex: 1;
    }
    .welcome-avatar {
      width: 80px;
      height: 80px;
      background: linear-gradient(135deg, var(--green-mid), var(--green-accent));
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 40px;
      margin-bottom: 16px;
      box-shadow: 0 8px 24px rgba(82,183,136,0.25);
    }
    .welcome h2 {
      font-size: 20px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 8px;
    }
    .welcome p {
      font-size: 14px;
      color: var(--text-muted);
      line-height: 1.7;
      max-width: 300px;
    }
    .welcome-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      justify-content: center;
      margin-top: 16px;
    }
    .welcome-tag {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--green-bright);
      font-size: 12px;
      padding: 5px 11px;
      border-radius: 12px;
    }

    /* ── MESSAGES ── */
    .msg-row {
      display: flex;
      align-items: flex-end;
      gap: 8px;
      animation: msgIn 0.25s ease;
    }
    @keyframes msgIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

    .msg-row.user { flex-direction: row-reverse; }

    .msg-av {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 15px;
      flex-shrink: 0;
      margin-bottom: 2px;
    }
    .msg-av.bot { background: linear-gradient(135deg, var(--green-light), var(--green-accent)); }
    .msg-av.usr { background: linear-gradient(135deg, #1565c0, #1976d2); }

    .bubble-wrap { display: flex; flex-direction: column; max-width: 78%; }
    .msg-row.user .bubble-wrap { align-items: flex-end; }

    .bubble {
      padding: 10px 14px;
      border-radius: 18px;
      font-size: 14.5px;
      line-height: 1.65;
      word-break: break-word;
    }
    .msg-row.bot .bubble {
      background: var(--bot-bubble);
      color: #e8f5e9;
      border: 1px solid rgba(82,183,136,0.12);
      border-bottom-left-radius: 5px;
    }
    .msg-row.user .bubble {
      background: var(--user-bubble);
      color: #f1fff2;
      border-bottom-right-radius: 5px;
    }

    .bubble strong { color: #a5d6a7; }

    .msg-time {
      font-size: 10.5px;
      color: rgba(255,255,255,0.3);
      margin-top: 3px;
      padding: 0 4px;
    }

    .speak-btn {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 14px;
      padding: 3px 6px;
      color: rgba(255,255,255,0.4);
      transition: color 0.2s;
      margin-top: 2px;
      align-self: flex-start;
    }
    .msg-row.user .speak-btn { align-self: flex-end; }
    .speak-btn:active { color: var(--green-accent); }

    /* Typing */
    .typing-row {
      display: flex;
      align-items: flex-end;
      gap: 8px;
    }
    .typing-bubble {
      background: var(--bot-bubble);
      border: 1px solid rgba(82,183,136,0.12);
      border-bottom-left-radius: 5px;
      padding: 12px 16px;
      border-radius: 18px;
      display: flex;
      gap: 5px;
      align-items: center;
    }
    .typing-bubble span {
      width: 7px; height: 7px;
      background: var(--green-accent);
      border-radius: 50%;
      animation: typingBounce 1.3s infinite;
    }
    .typing-bubble span:nth-child(2) { animation-delay: 0.2s; }
    .typing-bubble span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes typingBounce { 0%,80%,100%{transform:translateY(0);opacity:0.4} 40%{transform:translateY(-6px);opacity:1} }

    /* ── INPUT AREA ── */
    .input-section {
      flex-shrink: 0;
      background: var(--surface);
      border-top: 1px solid var(--border);
      padding: 8px 12px 12px;
      padding-bottom: max(12px, env(safe-area-inset-bottom));
    }

    .voice-status {
      font-size: 12px;
      color: #ef9a9a;
      text-align: center;
      min-height: 18px;
      margin-bottom: 6px;
    }
    .voice-status.active { color: var(--green-accent); }

    .input-row {
      display: flex;
      align-items: flex-end;
      gap: 8px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 26px;
      padding: 6px 6px 6px 14px;
    }
    .input-row:focus-within {
      border-color: rgba(82,183,136,0.4);
      box-shadow: 0 0 0 3px rgba(82,183,136,0.08);
    }

    textarea {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text);
      font-size: 15px;
      resize: none;
      max-height: 100px;
      min-height: 36px;
      line-height: 1.5;
      font-family: inherit;
      padding: 6px 0;
      scrollbar-width: none;
    }
    textarea::-webkit-scrollbar { display: none; }
    textarea::placeholder { color: rgba(255,255,255,0.3); }

    .input-btns { display: flex; gap: 6px; align-items: center; flex-shrink: 0; }

    .icon-btn {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 17px;
      transition: all 0.18s;
      flex-shrink: 0;
    }
    .btn-clear {
      background: transparent;
      color: rgba(255,255,255,0.35);
      font-size: 15px;
    }
    .btn-clear:active { color: #ef9a9a; }

    .btn-voice {
      background: var(--surface);
      color: var(--green-bright);
      border: 1px solid var(--border);
    }
    .btn-voice:active { background: var(--green-light); }
    .btn-voice.recording {
      background: #b71c1c;
      border-color: #e53935;
      color: #fff;
      animation: recPulse 1s infinite;
    }
    @keyframes recPulse { 0%,100%{box-shadow:0 0 0 0 rgba(229,57,53,0.4)} 50%{box-shadow:0 0 0 7px rgba(229,57,53,0)} }

    .btn-send {
      background: linear-gradient(135deg, var(--green-light), var(--green-accent));
      color: #fff;
      box-shadow: 0 2px 8px rgba(82,183,136,0.35);
    }
    .btn-send:active { transform: scale(0.93); }
    .btn-send:disabled { opacity: 0.4; cursor: not-allowed; transform: none; box-shadow: none; }
  </style>
</head>
<body>

<div class="app">

  <!-- Header -->
  <header>
    <div class="avatar-header">🌾</div>
    <div class="header-info">
      <h1>किसान मित्र AI</h1>
      <div class="status">
        <span class="status-dot"></span>
        <span>Online · आपका AI साथी</span>
      </div>
    </div>
    <div class="header-badge">🇮🇳 हिंदी</div>
  </header>

  <!-- Quick Chips -->
  <div class="chips-wrap" id="chips">
    <button class="chip" onclick="askQuick('गेहूं में कौन सी खाद डालें?')">🌾 गेहूं खाद</button>
    <button class="chip" onclick="askQuick('धान की फसल में कीट लगे हैं, क्या करें?')">🐛 धान कीट</button>
    <button class="chip" onclick="askQuick('PM-KISAN योजना के बारे में बताओ')">💰 PM-KISAN</button>
    <button class="chip" onclick="askQuick('टमाटर उगाने का सही तरीका बताओ')">🍅 टमाटर</button>
    <button class="chip" onclick="askQuick('मिट्टी परीक्षण कैसे कराएं?')">🌱 मिट्टी</button>
    <button class="chip" onclick="askQuick('Drip irrigation के फायदे क्या हैं?')">💧 सिंचाई</button>
    <button class="chip" onclick="askQuick('गन्ने की खेती कैसे करें?')">🎋 गन्ना</button>
    <button class="chip" onclick="askQuick('मौसम के हिसाब से कौन सी फसल बोएं?')">☀️ मौसम</button>
  </div>

  <!-- Chat Area -->
  <div class="chat-area" id="chatArea">
    <div class="welcome" id="welcome">
      <div class="welcome-avatar">👨‍🌾</div>
      <h2>नमस्ते! मैं किसान मित्र हूँ</h2>
      <p>खेती, खाद, बीज, फसल, और सरकारी योजनाओं पर कोई भी सवाल पूछें — हिंदी या English में।</p>
      <div class="welcome-tags">
        <span class="welcome-tag">🌾 फसल</span>
        <span class="welcome-tag">🧪 खाद</span>
        <span class="welcome-tag">💧 सिंचाई</span>
        <span class="welcome-tag">🐛 कीट</span>
        <span class="welcome-tag">💰 योजनाएं</span>
        <span class="welcome-tag">🎤 Voice</span>
      </div>
    </div>
  </div>

  <!-- Input Section -->
  <div class="input-section">
    <div class="voice-status" id="voiceStatus"></div>
    <div class="input-row">
      <textarea
        id="userInput"
        placeholder="सवाल लिखें या 🎤 बोलें..."
        rows="1"
        onkeydown="handleKey(event)"
        oninput="resize(this)"
      ></textarea>
      <div class="input-btns">
        <button class="icon-btn btn-clear" onclick="clearChat()" title="Clear">🗑️</button>
        <button class="icon-btn btn-voice" id="voiceBtn" onclick="toggleVoice()">🎤</button>
        <button class="icon-btn btn-send" id="sendBtn" onclick="sendMsg()">➤</button>
      </div>
    </div>
  </div>

</div>

<script>
  const sessionId = 'ks_' + Math.random().toString(36).substr(2, 9);
  let isRec = false, recognition = null, isSpeaking = false;

  function resize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 100) + 'px';
  }

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMsg(); }
  }

  function askQuick(q) {
    const inp = document.getElementById('userInput');
    inp.value = q;
    resize(inp);
    sendMsg();
  }

  function now() {
    return new Date().toLocaleTimeString('hi-IN', { hour: '2-digit', minute: '2-digit' });
  }

  function appendMsg(role, text) {
    document.getElementById('welcome')?.remove();
    const area = document.getElementById('chatArea');

    const row = document.createElement('div');
    row.className = 'msg-row ' + role;

    if (role === 'bot') {
      row.innerHTML = `
        <div class="msg-av bot">🌾</div>
        <div class="bubble-wrap">
          <div class="bubble" id="b${Date.now()}">${fmt(text)}</div>
          <div style="display:flex;align-items:center;gap:4px">
            <span class="msg-time">${now()}</span>
            <button class="speak-btn" onclick="speak(this)" data-text="${esc(text)}">🔊</button>
          </div>
        </div>`;
    } else {
      row.innerHTML = `
        <div class="bubble-wrap">
          <div class="bubble">${escHtml(text)}</div>
          <span class="msg-time" style="text-align:right">${now()}</span>
        </div>
        <div class="msg-av usr">👤</div>`;
    }

    area.appendChild(row);
    area.scrollTop = area.scrollHeight;
    return row;
  }

  function escHtml(t) { return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  function esc(t) { return t.replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }
  function fmt(t) {
    return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
      .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
      .replace(/\*(.+?)\*/g,'<em>$1</em>')
      .replace(/^#{1,3} (.+)$/gm,'<strong>$1</strong>')
      .replace(/^- (.+)$/gm,'• $1')
      .replace(/\n/g,'<br/>');
  }

  async function sendMsg() {
    const inp = document.getElementById('userInput');
    const msg = inp.value.trim();
    if (!msg) return;

    const btn = document.getElementById('sendBtn');
    btn.disabled = true;
    inp.value = '';
    inp.style.height = 'auto';

    appendMsg('user', msg);

    // Typing indicator
    const area = document.getElementById('chatArea');
    const typing = document.createElement('div');
    typing.className = 'typing-row';
    typing.id = 'typing';
    typing.innerHTML = `
      <div class="msg-av bot">🌾</div>
      <div class="typing-bubble"><span></span><span></span><span></span></div>`;
    area.appendChild(typing);
    area.scrollTop = area.scrollHeight;

    try {
      const res = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: msg, sessionId }),
      });

      document.getElementById('typing')?.remove();

      if (!res.ok) {
        const err = await res.json();
        appendMsg('bot', '❌ ' + (err.error || 'कुछ गलत हो गया।'));
        btn.disabled = false; return;
      }

      document.getElementById('welcome')?.remove();
      const row = document.createElement('div');
      row.className = 'msg-row bot';
      const bid = 'b' + Date.now();
      row.innerHTML = `
        <div class="msg-av bot">🌾</div>
        <div class="bubble-wrap">
          <div class="bubble" id="${bid}"></div>
          <div style="display:flex;align-items:center;gap:4px">
            <span class="msg-time">${now()}</span>
            <button class="speak-btn" id="sp_${bid}" onclick="speak(this)" data-text="">🔊</button>
          </div>
        </div>`;
      area.appendChild(row);

      const bubble = document.getElementById(bid);
      const spBtn = document.getElementById('sp_' + bid);
      let full = '';

      const reader = res.body.getReader();
      const dec = new TextDecoder();

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        for (const line of dec.decode(value).split('\n')) {
          if (!line.startsWith('data: ')) continue;
          try {
            const d = JSON.parse(line.slice(6));
            if (d.type === 'text') { full += d.content; bubble.innerHTML = fmt(full); area.scrollTop = area.scrollHeight; }
            else if (d.type === 'done') { spBtn.dataset.text = full; }
            else if (d.type === 'error') { bubble.innerHTML = '❌ ' + d.content; }
          } catch {}
        }
      }

    } catch {
      document.getElementById('typing')?.remove();
      appendMsg('bot', '❌ Connection error. Internet check करें।');
    }

    btn.disabled = false;
    inp.focus();
  }

  // TTS
  function speak(btn) {
    const text = btn.dataset.text;
    if (!text) return;
    if (isSpeaking) { speechSynthesis.cancel(); isSpeaking = false; btn.textContent = '🔊'; return; }
    document.querySelectorAll('.speak-btn').forEach(b => b.textContent = '🔊');
    const u = new SpeechSynthesisUtterance(text);
    u.lang = /[\u0900-\u097F]/.test(text) ? 'hi-IN' : 'en-IN';
    u.rate = 0.9;
    const hv = speechSynthesis.getVoices().find(v => v.lang.startsWith('hi'));
    if (hv && u.lang === 'hi-IN') u.voice = hv;
    u.onstart = () => { isSpeaking = true; btn.textContent = '⏹️'; };
    u.onend = u.onerror = () => { isSpeaking = false; btn.textContent = '🔊'; };
    speechSynthesis.speak(u);
  }

  // Voice Input
  function toggleVoice() {
    if (!('webkitSpeechRecognition' in window || 'SpeechRecognition' in window)) {
      setStatus('❌ Browser voice support नहीं। Chrome use करें।', false); return;
    }
    isRec ? stopVoice() : startVoice();
  }

  function startVoice() {
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    recognition = new SR();
    recognition.continuous = false;
    recognition.interimResults = true;
    recognition.lang = 'hi-IN';

    recognition.onstart = () => {
      isRec = true;
      document.getElementById('voiceBtn').classList.add('recording');
      document.getElementById('voiceBtn').textContent = '🔴';
      setStatus('🎤 बोलिए...', true);
    };

    recognition.onresult = (e) => {
      let final = '', interim = '';
      for (let i = e.resultIndex; i < e.results.length; i++) {
        (e.results[i].isFinal ? (final += e.results[i][0].transcript) : (interim += e.results[i][0].transcript));
      }
      const inp = document.getElementById('userInput');
      inp.value = final || interim;
      resize(inp);
    };

    recognition.onend = () => {
      isRec = false;
      const vb = document.getElementById('voiceBtn');
      vb.classList.remove('recording');
      vb.textContent = '🎤';
      setStatus('', false);
      const msg = document.getElementById('userInput').value.trim();
      if (msg) setTimeout(sendMsg, 300);
    };

    recognition.onerror = (e) => {
      isRec = false;
      const vb = document.getElementById('voiceBtn');
      vb.classList.remove('recording');
      vb.textContent = '🎤';
      const msgs = { 'no-speech': '⚠️ कुछ सुनाई नहीं दिया।', 'not-allowed': '❌ Mic permission दें।' };
      setStatus(msgs[e.error] || '❌ Voice error.', false);
      setTimeout(() => setStatus('', false), 3000);
    };

    recognition.start();
  }

  function stopVoice() { recognition?.stop(); }

  function setStatus(msg, active) {
    const el = document.getElementById('voiceStatus');
    el.textContent = msg;
    el.className = 'voice-status' + (active ? ' active' : '');
  }

  async function clearChat() {
    if (!confirm('Chat clear करें?')) return;
    await fetch('/api/clear', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ sessionId }) });
    document.getElementById('chatArea').innerHTML = `
      <div class="welcome" id="welcome">
        <div class="welcome-avatar">👨‍🌾</div>
        <h2>नमस्ते! मैं किसान मित्र हूँ</h2>
        <p>खेती, खाद, बीज, फसल, और सरकारी योजनाओं पर कोई भी सवाल पूछें।</p>
        <div class="welcome-tags">
          <span class="welcome-tag">🌾 फसल</span>
          <span class="welcome-tag">🧪 खाद</span>
          <span class="welcome-tag">💧 सिंचाई</span>
          <span class="welcome-tag">🐛 कीट</span>
          <span class="welcome-tag">💰 योजनाएं</span>
          <span class="welcome-tag">🎤 Voice</span>
        </div>
      </div>`;
  }

  speechSynthesis?.getVoices();
  speechSynthesis?.addEventListener('voiceschanged', () => speechSynthesis.getVoices());
  document.getElementById('userInput').focus();
</script>
</body>
</html>
